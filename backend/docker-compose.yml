services:

  # ── PostgreSQL Database ──────────────────────────
  db:
    image: postgres:15
    container_name: labourgo_db
    environment:
      POSTGRES_DB: labourgo
      POSTGRES_USER: labourgo_user
      POSTGRES_PASSWORD: labourgo_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labourgo_user -d labourgo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django Backend ───────────────────────────────
  web:
    build: .
    container_name: labourgo_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY=docker-secret-key-change-in-production
      - DEBUG=True
      - DATABASE_URL=postgresql://labourgo_user:labourgo_pass@db:5432/labourgo
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    container_name: labourgo_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
volumes:
  postgres_data:

