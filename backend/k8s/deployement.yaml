apiVersion: apps/v1
kind: Deployment

metadata:
  name: django-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: django

  template:
    metadata:
      labels:
        app: django

    spec:
      containers:
      - name: django
        image: labourgo:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 8000