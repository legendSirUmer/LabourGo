name: LabourGo Django CI

# Trigger: runs on every push or pull request to these branches
on:
  push:
    branches: [ main, rabeen/module-3 ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Django Tests
    runs-on: ubuntu-latest

    # Spin up PostgreSQL for testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: labourgo_test
          POSTGRES_USER: labourgo_user
          POSTGRES_PASSWORD: labourgo_pass
        ports:
          - 5432:5432
        # Wait until postgres is ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

    # Step 1: Checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Cache pip packages (speeds up future runs)
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Step 4: Install dependencies
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 5: Run migrations
    - name: Run migrations
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
        DATABASE_URL: postgresql://labourgo_user:labourgo_pass@localhost:5432/labourgo_test
      run: |
        cd backend
        python manage.py migrate

    # Step 6: Run tests
    - name: Run tests
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
        DATABASE_URL: postgresql://labourgo_user:labourgo_pass@localhost:5432/labourgo_test
      run: |
        cd backend
        python manage.py test --verbosity=2
